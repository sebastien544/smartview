<html lang="en">
<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Listings — SmartView</title>
  <meta name="description" content="All available properties — filter and contact us." />
  <link rel="canonical" href="https://smartview-huahin.com/en/listings.html" />
  <link rel="alternate" hreflang="en" href="https://smartview-huahin.com/en/listings.html" />
  <link rel="alternate" hreflang="fr" href="https://smartview-huahin.com/fr/listings.html" />
  <link rel="alternate" hreflang="x-default" href="https://smartview-huahin.com/listings.html" />

</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KRBH34LP"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div id="site-header"></div>
  <div class="lang-pill">
    <a href="../fr/listings.html">FR</a>
    <span class="lang-sep">|</span>
    <span class="lang-active">EN</span>
  </div>

  <main class="main-content">
    <section id="annonces" class="container" style="padding-top:28px">
      <div class="section-title" style="display: flex; flex-direction: column;align-items: flex-start;">
        <div>
          <h2>Listings</h2>
          <p>All available properties — filter and contact us.</p>
        </div>
        <div class="" aria-label="Property search" style="display:flex; gap:10px; align-items:center;">
         <form id="searchForm" class="" onsubmit="rechercher(event); return false;">
              <div class="search-row" style="display: flex;align-items: center;">
                <div class="field">
                  <label for="quartier">Neighborhood</label>
                  <select id="quartier" name="quartier">
                    <option value="all">All</option>
                    <option value="hua-hin-centre">Hua Hin City Centre</option>
                    <option value="khao-takiab">Khao Takiab</option>
                    <option value="hin-lek-fai">Hin Lek Fai</option>
                    <option value="pranburi">Pranburi</option>
                    <option value="black-mountain">Black Mountain</option>
                    <option value="cha-am">Cha-Am</option>
                  </select>
                </div>

                <div class="field">
                  <label for="type">Type</label>
                  <select id="type" name="type">
                    <option value="all">All</option>
                    <option value="appartement">Apartment</option>
                    <option value="villa">Villa</option>
                    <option value="bureau">Office</option>
                  </select>
                </div>

                <div class="field">
                  <label for="budget">Budget</label>
                  <select id="budget" name="budget">
                    <option value="all">All budgets</option>
                    <option value="0:3000000">Under 3,000,000 ฿</option>
                    <option value="3000000:8000000">3,000,000 ฿ – 8,000,000 ฿</option>
                    <option value="8000000:15000000">8,000,000 ฿ – 15,000,000 ฿</option>
                    <option value="15000000:30000000">15,000,000 ฿ – 30,000,000 ฿</option>
                    <option value="30000000:">Over 30,000,000 ฿</option>
                  </select>
                </div>

                <button class="btn primary" type="submit" aria-label="Search" style="margin-top:1em;">
                  Search
                </button>
              </div>
            </form>
            <button class="btn small ghost" id="resetBtn" type="button" onclick="reinit()" style="margin-top:1em;">
              Reset
            </button>
            <label class="currency-control" style="margin-top:1em;">
              <span>Show prices in</span>
              <select id="currencySelect" aria-label="Currency selection">
                <option value="THB">THB ฿</option>
                <option value="EUR">EUR €</option>
                <option value="USD">USD $</option>
              </select>
            </label>
            </div>
      </div>

      <div class="grid" id="listings" aria-live="polite"></div>

      <div id="pagination" style="margin-top:20px;"></div>

      <p id="emptyState" class="hide" style="color:var(--muted); font-weight:750; margin-top:14px;">No properties match your search.</p>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="../JS/main.js" defer></script>
  <script src="../JS/whatsapp-button.js" defer></script>
  <script src="../JS/phone-tracking.js" defer></script>
  <script src="../JS/i18n.js" defer></script>
  <script src="../JS/core.js" defer></script>
  <script src="../JS/properties.js" defer></script>
  <script>
    let ITEMS_PER_PAGE = 12;
    let currentPage = parseInt(new URLSearchParams(location.search).get('page')) || 1;

    // ---- Neighborhood filter (from URL ?quartier=...) ----
    const QUARTIER_LABELS = {
      'hua-hin-centre':'Hua Hin City Centre',
      'khao-takiab':'Khao Takiab',
      'hin-lek-fai':'Hin Lek Fai',
      'pranburi':'Pranburi',
      'black-mountain':'Black Mountain',
      'cha-am':'Cha-Am',
    };
    const QUARTIER_MATCHERS = {
      'cha-am':         p => /cha[-‑\s]?am/i.test(p.city||'') || /cha[-‑\s]?am/i.test((p.location||{}).label||''),
      'black-mountain': p => /black\s*mountain/i.test(((p.location||{}).label||'') + ' ' + (p.desc||'')),
      'khao-takiab':    p => /khao\s*takiab|takiab\b|nong\s*kae/i.test((p.location||{}).label||''),
      'hin-lek-fai':    p => /hin\s*lek\s*fai/i.test((p.location||{}).label||''),
      'pranburi':       p => /pranburi|pran\s*buri|khao\s*tao|sam\s*roi/i.test((p.city||'') + ' ' + ((p.location||{}).label||'')),
      'hua-hin-centre': p => {
        if (!/hua\s*hin/i.test(p.city||'')) return false;
        const lbl = (p.location||{}).label||'';
        return !/khao\s*takiab|takiab\b|nong\s*kae|hin\s*lek\s*fai|black\s*mountain|khao\s*tao/i.test(lbl);
      },
    };
    let activeQuartier = new URLSearchParams(location.search).get('quartier');
    if (activeQuartier && !QUARTIER_MATCHERS[activeQuartier]) activeQuartier = null;

    document.addEventListener('DOMContentLoaded', () => {
      const sel = document.getElementById('quartier');
      if (sel && activeQuartier) sel.value = activeQuartier;
    });

    function applyAllFilters(baseList, formEl) {
      let list = baseList;
      let q = activeQuartier;
      if (formEl) {
        const fq = new FormData(formEl).get('quartier');
        if (fq && fq !== 'all' && QUARTIER_MATCHERS[fq]) q = fq;
        else if (fq === 'all') q = null;
      }
      if (q) list = list.filter(QUARTIER_MATCHERS[q]);
      if (formEl) {
        const data = new FormData(formEl);
        const type = data.get('type') || 'all';
        const budget = data.get('budget') || 'all';
        list = list.filter(p => {
          const matchesType = (type === 'all' || p.type === type);
          let matchesBudget = true;
          if (budget !== 'all') {
            const [rawMin, rawMax] = budget.split(':');
            const min = rawMin ? Number(rawMin) : 0;
            const max = rawMax ? Number(rawMax) : Infinity;
            matchesBudget = p.price >= min && p.price <= max;
          }
          return matchesType && matchesBudget;
        });
      }
      return list;
    }

    function renderQuartierChip() {
      let el = document.getElementById('quartierChip');
      if (!activeQuartier) { if (el) el.remove(); return; }
      if (!el) {
        el = document.createElement('div');
        el.id = 'quartierChip';
        el.className = 'quartier-chip';
        const grid = document.getElementById('listings');
        if (grid && grid.parentNode) grid.parentNode.insertBefore(el, grid);
      }
      el.innerHTML = 'Neighborhood: <strong></strong> <button type="button" aria-label="Show all properties">×</button>';
      el.querySelector('strong').textContent = QUARTIER_LABELS[activeQuartier];
      el.querySelector('button').onclick = clearQuartier;
    }

    function syncQuartierUrl() {
      const url = new URL(location.href);
      if (activeQuartier) url.searchParams.set('quartier', activeQuartier);
      else url.searchParams.delete('quartier');
      url.searchParams.delete('page');
      history.replaceState(null, '', url.toString());
    }

    function clearQuartier() {
      activeQuartier = null;
      const sel = document.getElementById('quartier');
      if (sel) sel.value = 'all';
      syncQuartierUrl();
      currentList = applyAllFilters(PROPERTIES_LOCALIZED(), document.getElementById('searchForm'));
      renderQuartierChip();
      renderPage(1);
    }

    function rechercher(e) {
      e.preventDefault();
      const fq = new FormData(e.target).get('quartier');
      activeQuartier = (fq && fq !== 'all' && QUARTIER_MATCHERS[fq]) ? fq : null;
      syncQuartierUrl();
      currentList = applyAllFilters(PROPERTIES_LOCALIZED(), e.target);
      renderQuartierChip();
      renderPage(1);
    }

    function reinit() {
      document.getElementById('searchForm').reset();
      activeQuartier = null;
      syncQuartierUrl();
      currentList = PROPERTIES_LOCALIZED();
      renderQuartierChip();
      renderPage(1);
    }

    function renderPage(page = currentPage) {
      if (activeQuartier && window.__quartierApplied !== activeQuartier) {
        currentList = currentList.filter(QUARTIER_MATCHERS[activeQuartier]);
        window.__quartierApplied = activeQuartier;
        renderQuartierChip();
      }
      const totalPages = Math.max(1, Math.ceil(currentList.length / ITEMS_PER_PAGE));
      page = Math.min(Math.max(1, page | 0), totalPages);
      currentPage = page;
      const start = (page - 1) * ITEMS_PER_PAGE;
      render(currentList.slice(start, start + ITEMS_PER_PAGE));
      updatePaginationControls(totalPages);
      const url = new URL(location.href);
      if (page === 1) url.searchParams.delete('page');
      else url.searchParams.set('page', page);
      history.replaceState(null, '', url.toString());
    }

  function updatePaginationControls(totalPages) {
    const container = document.getElementById('pagination');
    container.innerHTML = '';
    if (totalPages <= 1) return;

    const prev = document.createElement('button');
    prev.textContent = 'Previous';
    prev.disabled = (currentPage === 1);
    prev.onclick = () => renderPage(currentPage - 1);
    container.appendChild(prev);

    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.classList.toggle('active', i === currentPage);
      btn.onclick = () => renderPage(i);
      container.appendChild(btn);
    }

    const next = document.createElement('button');
    next.textContent = 'Next';
    next.disabled = (currentPage === totalPages);
    next.onclick = () => renderPage(currentPage + 1);
    container.appendChild(next);
   }
  </script>
</body>
</html>
