<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=/en/">
  <script>
    var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
    window.location.replace(lang.startsWith('fr') ? '/fr/' : '/en/');
  </script>
  <title>Page introuvable — SmartView</title>
</head>
<body>
  <a href="/en/">Continue</a> | <a href="/fr/">Continuer</a>
</body>
</html>
